description: |
  Drain-aware behavior for HID buttons (Button Page 0x09: mouse, joystick, gamepad).
  Param1 is HID button bit mask, same shape as &mkp: LCLK=BIT(0), RCLK=BIT(1),
  MCLK=BIT(2), MB4=BIT(3), MB5=BIT(4), OR'd for multiple. On release, drains ZMK HID
  press count to zero, so release lost in transport self-heals on next click instead of
  leaving button held until power-cycle.

compatible: "zmk,behavior-button-direct"

include: one_param.yaml
